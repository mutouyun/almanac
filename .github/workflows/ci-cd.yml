name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Verify dependencies
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Build (cross-compile for Windows)
        run: GOOS=windows GOARCH=amd64 go build -o almanac.exe ./cmd/almanac

      - name: Test
        run: go test -v ./...

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: almanac-windows
          path: almanac.exe
          retention-days: 1

  deploy:
    name: Deploy to Server
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: almanac-windows

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          PORT="${{ secrets.DEPLOY_PORT }}"
          ssh-keyscan -p "${PORT:-22}" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload binary to staging via SCP
        run: |
          PORT="${{ secrets.DEPLOY_PORT }}"
          scp -i ~/.ssh/deploy_key -P "${PORT:-22}" -o StrictHostKeyChecking=no \
            almanac.exe \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:C:/services/almanac/almanac-new.exe"

      - name: Backup, swap and restart service
        run: |
          PORT="${{ secrets.DEPLOY_PORT }}"
          ssh -i ~/.ssh/deploy_key -p "${PORT:-22}" -o StrictHostKeyChecking=no \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd C:\services\almanac && nssm stop almanac && (if exist almanac.exe.bak del almanac.exe.bak) && (if exist almanac.exe ren almanac.exe almanac.exe.bak) && ren almanac-new.exe almanac.exe && nssm start almanac && powershell -Command \"Start-Sleep -Seconds 3\" && nssm status almanac"
